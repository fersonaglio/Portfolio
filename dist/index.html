<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security Headers Meta Tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Content Security Policy - Restricts resource loading to same origin and trusted sources -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https:;
      font-src 'self';
      connect-src 'self';
      media-src 'self';
      object-src 'none';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    ">

    <!-- Prevent DNS prefetching for privacy -->
    <meta http-equiv="x-dns-prefetch-control" content="off" />

    <!-- Disable creepy features -->
    <meta name="permissions-policy" content="camera=(), microphone=(), geolocation=(), accelerometer=(), gyroscope=(), magnetometer=(), payment=(), usb=(), vr=()" />

    <title>Fernando Sonaglio - Portfolio</title>

    <!-- Meta description for SEO (not security, but good practice) -->
    <meta name="description" content="IT Systems & Database Administrator and Frontend Developer portfolio showcasing projects and skills." />
    <meta name="robots" content="index, follow, noimageindex" />
    <script type="module" crossorigin src="./assets/index-CjJFQ8IS.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BjOcZJkT.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
